<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RocketPrep — Material Preparation Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0f;
      --bg-elevated: #12161c;
      --bg-card: #161b22;
      --border: #1e2630;
      --text: #e8ecf1;
      --text-muted: #7a8699;
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.15);
      --amber: #ff9500;
      --amber-dim: rgba(255, 149, 0, 0.15);
      --green: #3dd68c;
      --red: #ff5c5c;
      --font-sans: "Space Grotesk", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 212, 255, 0.08), transparent),
        linear-gradient(180deg, var(--bg) 0%, #0d1014 100%);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .wordmark h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--cyan);
    }

    .wordmark p {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      box-shadow: 0 0 8px var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status.online .status-dot {
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }

    .status.offline .status-dot {
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
    }

    .status.online span { color: var(--green); }
    .status.offline span { color: var(--red); }

    /* Layout */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    section h2 {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 600px) {
      .card-grid { grid-template-columns: 1fr; }
    }

    .select-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .select-card:hover {
      border-color: rgba(0, 212, 255, 0.4);
      background: var(--bg-elevated);
    }

    .select-card.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 20px var(--cyan-dim);
      background: var(--cyan-dim);
    }

    .select-card .icon {
      font-size: 1.25rem;
      margin-bottom: 0.35rem;
    }

    .select-card .name {
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .select-card .meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--cyan);
      margin-top: 0.35rem;
    }

    .select-card.coating .meta { color: var(--amber); }

    /* Dimensions */
    .dims-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.75rem;
      align-items: end;
      margin-bottom: 1.25rem;
    }

    .dims-row .times {
      font-family: var(--font-mono);
      color: var(--text-muted);
      padding-bottom: 0.6rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
    }

    input[type="number"] {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
    }

    input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px var(--cyan-dim);
    }

    .btn-run {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
    }

    .btn-run:hover:not(:disabled) {
      box-shadow: 0 0 24px var(--cyan-dim);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Results */
    .results-panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      min-height: 420px;
    }

    .results-panel.hidden {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .results-panel.hidden .results-content { display: none; }
    .results-panel:not(.hidden) .placeholder { display: none; }

    /* Panel preview */
    .preview-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .preview-stage {
      position: relative;
      margin: 1rem 0;
    }

    .panel-base {
      background: linear-gradient(145deg, #2a3340 0%, #1a2129 100%);
      border: 1px solid var(--border);
      border-radius: 2px;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .panel-coating {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 212, 255, 0.55) 0%,
        rgba(0, 212, 255, 0.25) 100%
      );
      border-radius: 2px 2px 0 0;
      animation: coat-pulse 2.5s ease-in-out infinite;
    }

    @keyframes coat-pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .dim-label {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--cyan);
    }

    .dim-label.width {
      bottom: -1.4rem;
      left: 50%;
      transform: translateX(-50%);
    }

    .dim-label.height {
      right: -2.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .area-badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .area-badge strong { color: var(--cyan); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
    }

    .stat-box.waste {
      border-color: rgba(255, 149, 0, 0.3);
      background: var(--amber-dim);
    }

    .stat-box label {
      margin-bottom: 0.25rem;
    }

    .stat-box .value {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--cyan);
    }

    .stat-box.waste .value { color: var(--amber); }

    .summary-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: var(--bg-card);
      border-left: 2px solid var(--cyan);
      border-radius: 0 4px 4px 0;
    }

    .thickness-bar-wrap label { margin-bottom: 0.5rem; }

    .thickness-bar {
      height: 8px;
      background: var(--bg-card);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .thickness-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), #00a8cc);
      border-radius: 3px;
      transition: width 0.5s ease;
      min-width: 2px;
    }

    .thickness-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    /* History */
    .history-section {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .history-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .history-table td {
      padding: 0.65rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .history-table tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-table tbody tr:hover {
      background: var(--cyan-dim);
    }

    .history-table tbody tr.active {
      background: var(--cyan-dim);
      border-left: 2px solid var(--cyan);
    }

    .history-empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .error-toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(255, 92, 92, 0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      display: none;
      z-index: 100;
    }

    .error-toast.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="wordmark">
        <h1>ROCKETPREP</h1>
        <p>MATERIAL PREPARATION SIMULATOR</p>
      </div>
      <div class="status" id="status">
        <div class="status-dot"></div>
        <span>CHECKING...</span>
      </div>
    </header>

    <div class="main-grid">
      <section class="simulator-form">
        <h2>Configuration</h2>

        <p style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem;letter-spacing:0.08em;">MATERIAL</p>
        <div class="card-grid" id="material-cards"></div>

        <p style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem;letter-spacing:0.08em;">COATING</p>
        <div class="card-grid" id="coating-cards"></div>

        <div class="dims-row">
          <div>
            <label for="width">Width (m)</label>
            <input type="number" id="width" min="0.1" step="0.1" value="2.5" />
          </div>
          <span class="times">×</span>
          <div>
            <label for="height">Height (m)</label>
            <input type="number" id="height" min="0.1" step="0.1" value="1.8" />
          </div>
        </div>

        <button class="btn-run" id="run-btn" type="button">RUN SIMULATION</button>
      </section>

      <section>
        <h2>Results</h2>
        <div class="results-panel hidden" id="results-panel">
          <p class="placeholder">Run a simulation to see results</p>
          <div class="results-content">
            <div class="preview-wrap">
              <div class="preview-stage" id="preview-stage">
                <div class="panel-base" id="panel-base">
                  <div class="panel-coating" id="panel-coating"></div>
                </div>
                <span class="dim-label width" id="dim-width">2.5 m</span>
                <span class="dim-label height" id="dim-height">1.8 m</span>
              </div>
              <p class="area-badge">Area: <strong id="area-display">—</strong> m²</p>
            </div>

            <div class="stats-grid">
              <div class="stat-box">
                <label>Prep Time</label>
                <div class="value" id="stat-prep">—</div>
              </div>
              <div class="stat-box">
                <label>Coating Thickness</label>
                <div class="value" id="stat-thickness">—</div>
              </div>
              <div class="stat-box">
                <label>Total Time</label>
                <div class="value" id="stat-total">—</div>
              </div>
              <div class="stat-box waste">
                <label>Waste Mass</label>
                <div class="value" id="stat-waste">—</div>
              </div>
            </div>

            <p class="summary-text" id="summary-text"></p>

            <div class="thickness-bar-wrap">
              <label>Coating thickness (max 800 µm)</label>
              <div class="thickness-bar">
                <div class="thickness-fill" id="thickness-fill"></div>
              </div>
              <p class="thickness-label" id="thickness-label">0 / 800 µm</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section class="history-section">
      <h2 style="padding:1rem 1rem 0;">Simulation History</h2>
      <table class="history-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Material</th>
            <th>Coating</th>
            <th>Area</th>
            <th>Total Time</th>
            <th>Thickness</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
      <p class="history-empty" id="history-empty">No simulations yet</p>
    </section>
  </div>

  <div class="error-toast" id="error-toast"></div>

  <script>
    const MAX_THICKNESS_UM = 800;

    const MATERIALS = [
      { id: "aluminium_alloy", name: "Aluminium Alloy", icon: "⬡", basePrep: 45 },
      { id: "stainless_steel", name: "Stainless Steel", icon: "◆", basePrep: 60 },
      { id: "carbon_composite", name: "Carbon Composite", icon: "▣", basePrep: 90 },
    ];

    const COATINGS = [
      { id: "anti_corrosion", name: "Anti-Corrosion", icon: "🛡", thickness: 120 },
      { id: "thermal_protection", name: "Thermal Protection", icon: "🔥", thickness: 800 },
      { id: "nano_ceramic", name: "Nano-Ceramic", icon: "✦", thickness: 250 },
    ];

    const MATERIAL_NAMES = Object.fromEntries(MATERIALS.map((m) => [m.id, m.name]));
    const COATING_NAMES = Object.fromEntries(COATINGS.map((c) => [c.id, c.name]));

    let selectedMaterial = "aluminium_alloy";
    let selectedCoating = "anti_corrosion";
    let historyRecords = [];

    const statusEl = document.getElementById("status");
    const resultsPanel = document.getElementById("results-panel");
    const runBtn = document.getElementById("run-btn");
    const errorToast = document.getElementById("error-toast");

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add("show");
      setTimeout(() => errorToast.classList.remove("show"), 4000);
    }

    async function checkHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        if (res.ok && data.status === "ok") {
          statusEl.className = "status online";
          statusEl.querySelector("span").textContent = "SYSTEM ONLINE";
        } else {
          throw new Error("unhealthy");
        }
      } catch {
        statusEl.className = "status offline";
        statusEl.querySelector("span").textContent = "SYSTEM OFFLINE";
      }
    }

    function renderCards() {
      const matGrid = document.getElementById("material-cards");
      matGrid.innerHTML = MATERIALS.map(
        (m) => `
        <div class="select-card ${m.id === selectedMaterial ? "selected" : ""}" data-material="${m.id}">
          <div class="icon">${m.icon}</div>
          <div class="name">${m.name}</div>
          <div class="meta">${m.basePrep} min base</div>
        </div>`
      ).join("");

      const coatGrid = document.getElementById("coating-cards");
      coatGrid.innerHTML = COATINGS.map(
        (c) => `
        <div class="select-card coating ${c.id === selectedCoating ? "selected" : ""}" data-coating="${c.id}">
          <div class="icon">${c.icon}</div>
          <div class="name">${c.name}</div>
          <div class="meta">${c.thickness} µm</div>
        </div>`
      ).join("");

      matGrid.querySelectorAll("[data-material]").forEach((el) => {
        el.addEventListener("click", () => {
          selectedMaterial = el.dataset.material;
          renderCards();
        });
      });

      coatGrid.querySelectorAll("[data-coating]").forEach((el) => {
        el.addEventListener("click", () => {
          selectedCoating = el.dataset.coating;
          renderCards();
        });
      });
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function displayResults(data, fromHistory = false) {
      resultsPanel.classList.remove("hidden");

      const w = data.panel_width_m ?? 2;
      const h = data.panel_height_m ?? 2;
      const area = data.panel_area_sqm;
      const thickness = data.coating_thickness_microns;

      const maxDim = Math.max(w, h, 1);
      const scale = 140 / maxDim;
      const panelW = Math.max(w * scale, 40);
      const panelH = Math.max(h * scale, 40);
      const coatH = Math.max((thickness / MAX_THICKNESS_UM) * 24, 4);

      const base = document.getElementById("panel-base");
      const coat = document.getElementById("panel-coating");
      base.style.width = `${panelW}px`;
      base.style.height = `${panelH}px`;
      coat.style.height = `${coatH}px`;

      document.getElementById("dim-width").textContent = `${w} m`;
      document.getElementById("dim-height").textContent = `${h} m`;
      document.getElementById("area-display").textContent = area?.toFixed(2) ?? "—";

      document.getElementById("stat-prep").textContent =
        `${data.prep_time_minutes} min`;
      document.getElementById("stat-thickness").textContent =
        `${thickness} µm`;
      document.getElementById("stat-total").textContent =
        `${data.total_process_time_minutes} min`;
      document.getElementById("stat-waste").textContent =
        `${data.waste_mass_kg} kg`;

      const summary = data.summary ||
        `Prepared ${area?.toFixed(2)} m² ${MATERIAL_NAMES[data.material] || data.material} with ${COATING_NAMES[data.coating] || data.coating} (${thickness} µm).`;
      document.getElementById("summary-text").textContent = summary;

      const pct = Math.min((thickness / MAX_THICKNESS_UM) * 100, 100);
      document.getElementById("thickness-fill").style.width = `${pct}%`;
      document.getElementById("thickness-label").textContent =
        `${thickness} / ${MAX_THICKNESS_UM} µm`;

      if (!fromHistory) {
        loadHistory();
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch("/api/v1/simulations");
        if (!res.ok) throw new Error("Failed to load history");
        historyRecords = await res.json();
        renderHistory();
      } catch (e) {
        showError(e.message);
      }
    }

    function renderHistory() {
      const tbody = document.getElementById("history-body");
      const empty = document.getElementById("history-empty");
      const rows = historyRecords.slice(0, 10);

      if (rows.length === 0) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      tbody.innerHTML = rows.map((r) => `
        <tr data-id="${r.id}">
          <td>${r.id}</td>
          <td>${MATERIAL_NAMES[r.material] || r.material}</td>
          <td>${COATING_NAMES[r.coating] || r.coating}</td>
          <td>${r.panel_area_sqm.toFixed(2)} m²</td>
          <td>${r.total_process_time_minutes} min</td>
          <td>${r.coating_thickness_microns} µm</td>
          <td>${formatDate(r.created_at)}</td>
        </tr>
      `).join("");

      tbody.querySelectorAll("tr").forEach((tr) => {
        tr.addEventListener("click", async () => {
          tbody.querySelectorAll("tr").forEach((r) => r.classList.remove("active"));
          tr.classList.add("active");
          const id = tr.dataset.id;
          try {
            const res = await fetch(`/api/v1/simulations/${id}`);
            if (!res.ok) throw new Error("Record not found");
            const record = await res.json();
            displayResults(record, true);
          } catch (e) {
            showError(e.message);
          }
        });
      });
    }

    async function runSimulation() {
      const width = parseFloat(document.getElementById("width").value);
      const height = parseFloat(document.getElementById("height").value);

      if (!width || width <= 0 || !height || height <= 0) {
        showError("Panel dimensions must be greater than zero");
        return;
      }

      runBtn.disabled = true;
      runBtn.textContent = "RUNNING...";

      try {
        const res = await fetch("/api/v1/simulate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            material: selectedMaterial,
            coating: selectedCoating,
            panel_width_m: width,
            panel_height_m: height,
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail?.[0]?.msg || "Simulation failed");
        }

        const data = await res.json();
        displayResults(data);
      } catch (e) {
        showError(e.message || "Simulation failed");
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = "RUN SIMULATION";
      }
    }

    runBtn.addEventListener("click", runSimulation);
    renderCards();
    checkHealth();
    loadHistory();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
